<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPlay 21点</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="config.js"></script>
    <script defer src="vendor/supabase.js"></script>
    <script defer src="room-common.js"></script>
    <script defer src="blackjack.js"></script>
  </head>
  <body>
    <div class="single-shell">
      <aside class="single-sidebar">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>21点</h1>
            <p>玩家对庄家，支持房间和机器人。</p>
          </div>
        </div>
        <a class="back-link" href="index.html">返回游戏大厅</a>

        <section class="connection-panel" aria-label="房间面板">
          <div class="panel-title">
            <h2>房间</h2>
            <span id="roomStatus">未进入</span>
          </div>
          <label>昵称<input id="nicknameInput" maxlength="16" autocomplete="off" /></label>
          <div class="button-grid">
            <button id="hostBtn" class="primary-btn" type="button">创建房间</button>
            <button id="joinBtn" type="button">加入房间</button>
            <button id="leaveRoomBtn" type="button" hidden>退出房间</button>
          </div>
          <label>房间号<input id="roomInput" maxlength="16" autocomplete="off" placeholder="输入房间号" /></label>
          <div class="share-box">
            <input id="shareInput" readonly placeholder="创建房间后生成邀请链接" />
            <button id="copyBtn" type="button">复制</button>
          </div>
        </section>

        <section class="control-card">
          <h3>牌桌</h3>
          <div class="inline-actions">
            <button id="addBlackjackRobotBtn" type="button">加机器人</button>
            <button id="resetBlackjackBtn" type="button">重置牌桌</button>
          </div>
          <button id="startBlackjackBtn" class="primary-btn" type="button">开始一局</button>
          <p id="blackjackRoomLog" class="mini-note">最多 3 名玩家同时对庄家。</p>
        </section>

        <section class="control-card">
          <h3>操作</h3>
          <strong id="blackjackTurn">等待开局</strong>
          <div class="inline-actions">
            <button id="hitBtn" class="primary-btn" type="button">要牌</button>
            <button id="standBtn" type="button">停牌</button>
          </div>
          <p id="blackjackLog" class="mini-note">点数尽量接近 21，超过 21 爆牌。</p>
        </section>
      </aside>

      <main class="single-stage">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Blackjack</p>
            <h2>21点</h2>
          </div>
          <div class="score-strip">
            <span id="blackjackRoomBadge">房间：未进入</span>
            <span id="blackjackPhaseBadge">等待开局</span>
          </div>
        </header>

        <section class="poker-table">
          <div class="poker-board surface-card">
            <h3>庄家</h3>
            <div id="dealerCards" class="card-hand center-play"></div>
            <strong id="dealerScore">点数：?</strong>
          </div>
          <div id="blackjackSeats" class="poker-seat-grid"></div>
        </section>
      </main>
    </div>
  </body>
</html>
