<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPlay 跳棋</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="room-common.js"></script>
    <script defer src="checkers.js"></script>
  </head>
  <body>
    <div class="single-shell">
      <aside class="single-sidebar">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>跳棋</h1>
            <p>本地双人 8x8</p>
          </div>
        </div>
        <a class="back-link" href="index.html">返回游戏大厅</a>
        <section class="connection-panel" aria-label="房间面板">
          <div class="panel-title">
            <h2>房间</h2>
            <span id="roomStatus">未进房</span>
          </div>
          <label>
            昵称
            <input id="nicknameInput" maxlength="16" autocomplete="off" />
          </label>
          <div class="button-grid">
            <button id="hostBtn" class="primary-btn" type="button">创建房间</button>
            <button id="joinBtn" type="button">加入房间</button>
          </div>
          <label>
            房间号
            <input id="roomInput" maxlength="16" autocomplete="off" placeholder="输入房间号" />
          </label>
          <div class="share-box">
            <input id="shareInput" readonly placeholder="创建房间后生成邀请链接" />
            <button id="copyBtn" type="button">复制</button>
          </div>
        </section>
        <section class="control-card">
          <h3>开局</h3>
          <label>
            人数
            <select id="checkersPlayerCount">
              <option value="2">2 人</option>
              <option value="3">3 人</option>
              <option value="4">4 人</option>
              <option value="5">5 人</option>
              <option value="6">6 人</option>
            </select>
          </label>
          <button id="startCheckersBtn" class="primary-btn" type="button">开始游戏</button>
        </section>
        <section class="control-card">
          <h3>回合</h3>
          <strong id="checkersTurn">红方</strong>
          <button id="resetCheckersBtn" type="button">重新开始</button>
          <p id="checkersLog" class="mini-note">点击己方棋子，再点击高亮目标格。支持跳吃和升王。</p>
        </section>
      </aside>
      <main class="single-stage">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Checkers</p>
            <h2>跳棋</h2>
          </div>
          <div class="score-strip">
            <span id="checkersRoomBadge">房间：未进入</span>
          </div>
        </header>
        <div id="checkersBoard" class="checkers-board" aria-label="跳棋棋盘"></div>
      </main>
    </div>
  </body>
</html>
