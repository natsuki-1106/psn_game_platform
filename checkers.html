<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPlay 跳棋</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="checkers.js"></script>
  </head>
  <body>
    <div class="single-shell">
      <aside class="single-sidebar">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>跳棋</h1>
            <p>本地双人 8x8</p>
          </div>
        </div>
        <a class="back-link" href="index.html">返回游戏大厅</a>
        <section class="control-card">
          <h3>回合</h3>
          <strong id="checkersTurn">红方</strong>
          <button id="resetCheckersBtn" type="button">重新开始</button>
          <p id="checkersLog" class="mini-note">点击己方棋子，再点击高亮目标格。支持跳吃和升王。</p>
        </section>
      </aside>
      <main class="single-stage">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Checkers</p>
            <h2>跳棋</h2>
          </div>
        </header>
        <div id="checkersBoard" class="checkers-board" aria-label="跳棋棋盘"></div>
      </main>
    </div>
  </body>
</html>
