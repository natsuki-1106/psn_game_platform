<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPlay 小游戏大厅</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="lobby-shell">
      <header class="lobby-header">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>LinkPlay</h1>
            <p>选择一个游戏，进入专属页面开始对战或练习</p>
          </div>
        </div>
      </header>

      <section class="lobby-grid lobby-grid-wide" aria-label="游戏大厅">
        <a class="lobby-game available" href="gomoku.html">
          <div class="lobby-game-art gomoku-art">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="lobby-game-body">
            <p class="eyebrow">2 人对战</p>
            <h2>五子棋</h2>
            <p>支持房间链接、刷新恢复、房间战绩和再开一把。</p>
          </div>
          <strong>进入游戏</strong>
        </a>

        <a class="lobby-game available" href="monopoly.html">
          <div class="lobby-game-art monopoly-art">
            <span class="chip red"></span>
            <span class="chip blue"></span>
            <span class="money">$</span>
          </div>
          <div class="lobby-game-body">
            <p class="eyebrow">2 人本地</p>
            <h2>大富翁</h2>
            <p>轻量跑图版，掷骰子、踩事件格、累计资产并冲线。</p>
          </div>
          <strong>进入游戏</strong>
        </a>

        <a class="lobby-game available" href="ludo.html">
          <div class="lobby-game-art ludo-art">
            <span class="plane red"></span>
            <span class="plane blue"></span>
            <span class="dice-face">6</span>
          </div>
          <div class="lobby-game-body">
            <p class="eyebrow">2 人本地</p>
            <h2>飞行棋</h2>
            <p>双人双机，本地轮流掷骰起飞、前进、回家。</p>
          </div>
          <strong>进入游戏</strong>
        </a>

        <a class="lobby-game available" href="checkers.html">
          <div class="lobby-game-art checkers-art">
            <span class="checker dark"></span>
            <span class="checker light"></span>
          </div>
          <div class="lobby-game-body">
            <p class="eyebrow">2 人本地</p>
            <h2>跳棋</h2>
            <p>8x8 跳吃规则，支持升王和回合提示。</p>
          </div>
          <strong>进入游戏</strong>
        </a>

        <a class="lobby-game available" href="landlord.html">
          <div class="lobby-game-art landlord-art">
            <span class="card">A</span>
            <span class="card">K</span>
            <span class="card">Q</span>
          </div>
          <div class="lobby-game-body">
            <p class="eyebrow">3 人本地</p>
            <h2>斗地主</h2>
            <p>轻量规则练习桌，支持单张、对子、三张、顺子、炸弹和王炸。</p>
          </div>
          <strong>进入游戏</strong>
        </a>
      </section>
    </main>
  </body>
</html>
