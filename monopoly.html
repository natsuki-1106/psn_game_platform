<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPlay 大富翁</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="config.js"></script>
    <script defer src="vendor/supabase.js"></script>
    <script defer src="room-common.js"></script>
    <script defer src="monopoly.js"></script>
  </head>
  <body>
    <div class="single-shell">
      <aside class="single-sidebar">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>大富翁</h1>
            <p>房间制 2-4 人环球地产局</p>
          </div>
        </div>
        <a class="back-link" href="index.html">返回游戏大厅</a>

        <section class="connection-panel" aria-label="房间面板">
          <div class="panel-title">
            <h2>房间</h2>
            <span id="roomStatus">未进房</span>
          </div>
          <label>
            昵称
            <input id="nicknameInput" maxlength="16" autocomplete="off" />
          </label>
          <div class="button-grid">
            <button id="hostBtn" class="primary-btn" type="button">创建房间</button>
            <button id="joinBtn" type="button">加入房间</button>
            <button id="leaveRoomBtn" type="button" hidden>退出房间</button>
          </div>
          <label>
            房间号
            <input id="roomInput" maxlength="16" autocomplete="off" placeholder="输入房间号" />
          </label>
          <div class="share-box">
            <input id="shareInput" readonly placeholder="创建房间后生成邀请链接" />
            <button id="copyBtn" type="button">复制</button>
          </div>
        </section>

        <section class="control-card">
          <h3>开局</h3>
          <label>
            人数
            <select id="monopolyPlayerCount">
              <option value="2">2 人</option>
              <option value="3">3 人</option>
              <option value="4">4 人</option>
            </select>
          </label>
          <button id="startMonopolyBtn" class="primary-btn" type="button">开始游戏</button>
        </section>

        <section class="control-card">
          <h3>回合</h3>
          <strong id="monopolyTurn">等待开始</strong>
          <button id="rollMonopolyBtn" class="primary-btn" type="button">掷骰子</button>
          <div id="monopolyBuyActions" class="inline-actions" hidden>
            <button id="buyPropertyBtn" class="primary-btn" type="button">购买</button>
            <button id="skipPropertyBtn" type="button">跳过</button>
          </div>
          <button id="resetMonopolyBtn" type="button">重新开始</button>
          <p id="monopolyLog" class="mini-note">全球国家地产版地图，落到空地会自动买入，落到他人地块则支付租金。</p>
        </section>
      </aside>

      <main class="single-stage">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Global Estates</p>
            <h2>大富翁</h2>
          </div>
          <div class="score-strip">
            <span id="monopolyRoomBadge">房间：未进入</span>
          </div>
        </header>

        <section class="monopoly-layout">
          <div class="monopoly-board-wrap">
            <div id="monopolyBoard" class="monopoly-map" aria-label="环球大富翁棋盘">
            <div class="monopoly-center">
              <p class="eyebrow">World Bank</p>
              <h3 id="monopolyCenterTitle">等待开局</h3>
              <p id="monopolyCenterText">围绕全球城市与国家航线行动，抢占高价值地块并保持现金流。</p>
              <div class="monopoly-center-globe" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div id="monopolyDice" class="monopoly-dice">-</div>
            </div>
            </div>
          </div>
          <aside class="info-card monopoly-sidecard">
            <h3>资产与地块</h3>
            <div id="monopolyStats" class="stat-grid"></div>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
