<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPlay 斗地主</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="vendor/peerjs.min.js"></script>
    <script defer src="room-common.js"></script>
    <script defer src="landlord.js"></script>
  </head>
  <body>
    <div class="single-shell">
      <aside class="single-sidebar">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>斗地主</h1>
            <p>房间制二人加机器人</p>
          </div>
        </div>
        <a class="back-link" href="index.html">返回游戏大厅</a>

        <section class="connection-panel" aria-label="房间面板">
          <div class="panel-title">
            <h2>房间</h2>
            <span id="roomStatus">未进房</span>
          </div>
          <label>
            昵称
            <input id="nicknameInput" maxlength="16" autocomplete="off" />
          </label>
          <div class="button-grid">
            <button id="hostBtn" class="primary-btn" type="button">创建房间</button>
            <button id="joinBtn" type="button">加入房间</button>
          </div>
          <label>
            房间号
            <input id="roomInput" maxlength="16" autocomplete="off" placeholder="输入房间号" />
          </label>
          <div class="share-box">
            <input id="shareInput" readonly placeholder="创建房间后生成邀请链接" />
            <button id="copyBtn" type="button">复制</button>
          </div>
        </section>

        <section class="control-card">
          <h3>开局</h3>
          <div class="inline-actions">
            <button id="addHumanBtn" type="button">加入真人</button>
            <button id="addRobotBtn" type="button">启动机器人</button>
          </div>
          <button id="startLandlordBtn" class="primary-btn" type="button">开始游戏</button>
          <p id="landlordRoomLog" class="mini-note">斗地主需要 3 个座位：最多 2 个真人，未满时可补机器人。</p>
        </section>

        <section class="control-card">
          <h3>叫地主</h3>
          <strong id="landlordPhase">等待发牌</strong>
          <div class="inline-actions">
            <button id="callLandlordBtn" class="primary-btn" type="button">叫地主</button>
            <button id="passBidBtn" type="button">不叫</button>
          </div>
          <p class="mini-note">首个叫地主会把倍率翻到 2，之后抢地主继续翻倍。</p>
        </section>

        <section class="control-card">
          <h3>操作</h3>
          <strong id="landlordTurn">等待开始</strong>
          <div class="inline-actions">
            <button id="hintCardsBtn" type="button">提示</button>
            <button id="playCardsBtn" class="primary-btn" type="button">出牌</button>
            <button id="passCardsBtn" type="button">不出</button>
          </div>
          <button id="resetLandlordBtn" type="button">重新发牌</button>
          <p id="landlordLog" class="mini-note">支持叫地主、底牌、提示、炸弹/王炸翻倍与手牌隐藏视角。</p>
        </section>
      </aside>

      <main class="single-stage">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Landlord</p>
            <h2>斗地主</h2>
          </div>
          <div class="score-strip">
            <span id="landlordRoomBadge">房间：未进入</span>
            <span id="landlordMultiplier">倍率：x1</span>
          </div>
        </header>

        <section class="stack-board">
          <div class="surface-card last-play">
            <h3>桌面</h3>
            <div id="lastPlay" class="card-hand"></div>
          </div>

          <div class="surface-card">
            <h3>底牌</h3>
            <div id="landlordBottom" class="card-hand"></div>
          </div>

          <div id="landlordPlayers" class="stack-board"></div>
        </section>
      </main>
    </div>
  </body>
</html>
