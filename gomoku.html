<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPlay 五子棋</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">LP</div>
          <div>
            <h1>五子棋</h1>
            <p>专属房间与对局页</p>
          </div>
        </div>

        <a class="back-link" href="index.html">返回游戏大厅</a>

        <section class="connection-panel" aria-label="联机面板">
          <div class="panel-title">
            <h2>房间</h2>
            <span id="connectionStatus">未连接</span>
          </div>
          <label>
            昵称
            <input id="nicknameInput" maxlength="16" autocomplete="off" />
          </label>
          <div class="button-grid">
            <button id="hostBtn" class="primary-btn" type="button">创建房间</button>
            <button id="localBtn" type="button">本地对战</button>
          </div>
          <label>
            房间码
            <input id="roomInput" maxlength="36" autocomplete="off" placeholder="输入好友的房间码" />
          </label>
          <button id="joinBtn" type="button">加入房间</button>
          <div class="share-box">
            <input id="shareInput" readonly placeholder="创建房间后生成邀请链接" />
            <button id="copyBtn" type="button">复制</button>
          </div>
        </section>
      </aside>

      <main class="game-stage">
        <header class="stage-header">
          <div>
            <p class="eyebrow">Gomoku Arena</p>
            <h2>五子棋</h2>
          </div>
          <div class="score-strip" aria-label="对局信息">
            <span id="blackPlayer">黑棋：等待</span>
            <span id="whitePlayer">白棋：等待</span>
          </div>
        </header>

        <section class="board-layout">
          <div class="canvas-wrap">
            <canvas id="boardCanvas" width="760" height="760" aria-label="五子棋棋盘"></canvas>
          </div>
          <aside class="match-panel">
            <div class="turn-card">
              <span id="turnBadge">黑棋先手</span>
              <strong id="matchStatus">创建或加入房间开始对战</strong>
            </div>
            <div class="actions">
              <button id="restartBtn" type="button">重新开始</button>
              <button id="undoBtn" type="button">悔棋</button>
            </div>
            <ol id="moveList" class="move-list" aria-label="落子记录"></ol>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
